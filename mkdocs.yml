site_name: ECE191 1/5th Scale Autonomous Car
site_description: Hardware and software bring-up documentation for the UCSD ECE191 autonomous RC car platform.

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Bring-Up:
    - Jetson: jetson.md
    - Camera: camera.md
    - YOLO: yolo.md
    - VESC: vesc.md
    - LiDAR: lidar.md
    - GNSS: gnss.md
  - Autonomy:
    - Sensor Fusion: sensor-fusion.md
    - Donkeycar: donkeycar.md
    - Path Following: path-following.md
    - Remote Controller: remote-controller.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

exclude_docs: |
  site/
